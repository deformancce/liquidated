<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#080a0f">
    <title>Liquidated</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <canvas id="flowCanvas" aria-label="Liquidated flow visualizer"></canvas>

      <section class="top-bar" aria-label="Market controls">
        <div class="brand-block">
          <p class="kicker">Liquidated</p>
          <h1>BTCUSDT</h1>
        </div>

        <div class="control-strip">
          <label class="field">
            <span>Pair</span>
            <select id="symbolSelect">
              <option value="BTC" selected>BTC</option>
              <option value="ETH">ETH</option>
              <option value="SOL">SOL</option>
              <option value="HYPE">HYPE</option>
            </select>
          </label>

          <div class="segment" aria-label="Data mode">
            <button id="liveButton" class="active" type="button">Live</button>
            <button id="demoButton" type="button">Demo</button>
          </div>

          <button id="audioButton" class="audio-button" type="button" aria-pressed="false">
            <span class="audio-dot" aria-hidden="true"></span>
            Audio
          </button>
        </div>
      </section>

      <aside class="side-panel" aria-label="Flow metrics and settings">
        <div class="status-row">
          <span id="statusLight" class="status-light"></span>
          <span id="statusText">Connecting</span>
        </div>

        <div class="metric-grid">
          <div>
            <span>Buy Flow</span>
            <strong id="buyFlow">$0</strong>
          </div>
          <div>
            <span>Sell Flow</span>
            <strong id="sellFlow">$0</strong>
          </div>
          <div>
            <span>Liqs</span>
            <strong id="liquidations">0</strong>
          </div>
          <div>
            <span>Pulse</span>
            <strong id="pulse">0</strong>
          </div>
        </div>

        <div class="meter-wrap">
          <div class="meter-label">
            <span>Pressure</span>
            <strong id="pressureLabel">Neutral</strong>
          </div>
          <div class="meter">
            <div id="pressureFill" class="meter-fill"></div>
          </div>
        </div>

        <div class="settings">
          <label>
            <span>Sensitivity</span>
            <input id="sensitivity" type="range" min="0.4" max="2.5" step="0.1" value="1.2">
          </label>
          <label>
            <span>Min Print</span>
            <input id="minSize" type="range" min="0" max="500000" step="5000" value="150000">
          </label>
          <label>
            <span>Volume</span>
            <input id="volume" type="range" min="0" max="0.9" step="0.03" value="0.28">
          </label>
          <label>
            <span>Timbre</span>
            <input id="timbre" type="range" min="0" max="1" step="0.05" value="0.45">
          </label>
          <label>
            <span>Space</span>
            <input id="space" type="range" min="0" max="1" step="0.05" value="0.35">
          </label>
        </div>

        <ol id="eventTape" class="event-tape" aria-label="Recent flow events"></ol>
      </aside>

      <section id="synthLab" class="synth-lab collapsed" aria-label="Tone.js granular synth lab">
        <header class="synth-lab-header">
          <div>
            <p class="kicker">Tone.js Lab</p>
            <h2>Granular Sample Synth</h2>
          </div>
          <button id="synthLabToggle" type="button">Open</button>
        </header>

        <div class="synth-lab-body">
          <div class="sample-row">
            <label class="file-field">
              <span>Audio Sample</span>
              <input id="sampleFile" type="file" accept="audio/*">
            </label>
            <div class="transport">
              <button id="grainPlay" type="button">Play</button>
              <button id="grainStop" type="button">Stop</button>
              <button id="grainRestart" type="button">Restart</button>
            </div>
          </div>
          <p id="synthLabStatus" class="synth-status">Load a sample</p>

          <div class="lab-grid">
            <fieldset>
              <legend>Granular</legend>
              <label><span>Grain Size</span><input id="grainSize" data-synth type="range" min="0.02" max="0.6" step="0.01" value="0.12"></label>
              <label><span>Overlap</span><input id="grainOverlap" data-synth type="range" min="0.005" max="0.3" step="0.005" value="0.06"></label>
              <label><span>Playback</span><input id="playbackRate" data-synth type="range" min="0.25" max="2.5" step="0.01" value="1"></label>
              <label><span>Detune</span><input id="grainDetune" data-synth type="range" min="-2400" max="2400" step="10" value="0"></label>
              <label class="check-row"><span>Reverse</span><input id="grainReverse" data-synth type="checkbox"></label>
            </fieldset>

            <fieldset>
              <legend>LFO Effects</legend>
              <label><span>Filter Cutoff</span><input id="filterCutoff" data-synth type="range" min="80" max="9000" step="10" value="1400"></label>
              <label><span>Filter Q</span><input id="filterQ" data-synth type="range" min="0.2" max="30" step="0.1" value="8"></label>
              <label><span>LFO Rate</span><input id="lfoRate" data-synth type="range" min="0.02" max="12" step="0.01" value="0.35"></label>
              <label><span>LFO Depth</span><input id="lfoDepth" data-synth type="range" min="0" max="5000" step="10" value="500"></label>
            </fieldset>

            <fieldset>
              <legend>Effects</legend>
              <label><span>Pitch Shift</span><input id="pitchShift" data-synth type="range" min="-24" max="24" step="1" value="0"></label>
              <label><span>Pitch Window</span><input id="pitchWindow" data-synth type="range" min="0.03" max="0.16" step="0.005" value="0.08"></label>
              <label><span>Delay Time</span><input id="delayTime" data-synth type="range" min="0.02" max="1" step="0.01" value="0.25"></label>
              <label><span>Delay Feedback</span><input id="delayFeedback" data-synth type="range" min="0" max="0.88" step="0.01" value="0.38"></label>
              <label><span>Reverb Decay</span><input id="reverbDecay" data-synth type="range" min="0.2" max="12" step="0.1" value="4.5"></label>
              <label><span>Pre Delay</span><input id="reverbPreDelay" data-synth type="range" min="0" max="0.5" step="0.01" value="0.08"></label>
            </fieldset>

            <fieldset>
              <legend>Spatialization</legend>
              <label><span>X</span><input id="spatialX" data-synth type="range" min="-4" max="4" step="0.1" value="0"></label>
              <label><span>Y</span><input id="spatialY" data-synth type="range" min="-2" max="2" step="0.1" value="0"></label>
              <label><span>Z</span><input id="spatialZ" data-synth type="range" min="-6" max="2" step="0.1" value="-0.5"></label>
            </fieldset>

            <fieldset>
              <legend>Buses</legend>
              <label><span>Dry Bus</span><input id="dryBus" data-synth type="range" min="0" max="1" step="0.01" value="0.74"></label>
              <label><span>Delay Wet</span><input id="delaySend" data-synth type="range" min="0" max="1" step="0.01" value="0.18"></label>
              <label><span>Reverb Wet</span><input id="reverbSend" data-synth type="range" min="0" max="1" step="0.01" value="0.28"></label>
              <label><span>Master</span><input id="labMaster" data-synth type="range" min="0" max="1" step="0.01" value="0.55"></label>
            </fieldset>

            <fieldset class="preset-fieldset">
              <legend>Preset</legend>
              <div class="preset-controls">
                <input id="presetName" type="text" value="Water Lab 01" aria-label="Preset name">
                <button id="saveSynthPreset" type="button">Save</button>
                <select id="savedSynthPresets" aria-label="Saved presets"></select>
                <button id="loadSynthPreset" type="button">Load</button>
                <button id="deleteSynthPreset" type="button">Delete</button>
                <button id="applySynthPreset" type="button">Apply JSON</button>
                <button id="resetSynthPreset" type="button">Reset</button>
              </div>
              <textarea id="synthPresetOutput" spellcheck="false"></textarea>
              <button id="copySynthPreset" type="button">Copy Preset</button>
            </fieldset>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
