<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#080a0f">
    <title>Liquidated</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <canvas id="flowCanvas" aria-label="Liquidated flow visualizer"></canvas>

      <section class="feed-panel" aria-label="Market feed">
        <span class="feed-label">Market Feed</span>
        <label class="feed-control">
          <span>Pair</span>
          <select id="symbolSelect">
            <option value="BTC" selected>BTC</option>
            <option value="ETH">ETH</option>
            <option value="SOL">SOL</option>
            <option value="HYPE">HYPE</option>
          </select>
        </label>
        <div class="feed-toggle" aria-label="Shaping">
          <button id="rawButton" type="button">Raw</button>
          <button id="aggregatedButton" class="active" type="button">Aggregated</button>
        </div>
        <label class="feed-control">
          <span>Min</span>
          <select id="minSize">
            <option value="0" selected>0</option>
            <option value="1000">$1k+</option>
            <option value="10000">$10k+</option>
            <option value="50000">$50k+</option>
            <option value="100000">$100k+</option>
          </select>
        </label>
        <label class="feed-control">
          <span>Window</span>
          <select id="windowMs">
            <option value="250" selected>250ms</option>
            <option value="500">500ms</option>
            <option value="1000">1000ms</option>
          </select>
        </label>
        <label class="feed-control">
          <span>Bucket</span>
          <select id="priceBucket">
            <option value="0">Exact</option>
            <option value="0.01">$0.01</option>
            <option value="0.05">$0.05</option>
            <option value="0.1">$0.10</option>
            <option value="0.25">$0.25</option>
            <option value="0.5">$0.50</option>
            <option value="1" selected>$1</option>
            <option value="2">$2</option>
            <option value="5">$5</option>
          </select>
        </label>
        <div class="segment" aria-label="Data mode">
          <button id="offButton" type="button">Off</button>
          <button id="liveButton" class="active" type="button">Live</button>
        </div>
        <button id="audioButton" class="audio-button" type="button" aria-pressed="false">
          <span class="audio-dot" aria-hidden="true"></span>
          Audio
        </button>
        <div class="status-row">
          <span id="statusLight" class="status-light"></span>
          <span id="statusText">Connecting</span>
        </div>
        <div class="metric-grid">
          <div>
            <span>Buy Flow</span>
            <strong id="buyFlow">$0</strong>
          </div>
          <div>
            <span>Sell Flow</span>
            <strong id="sellFlow">$0</strong>
          </div>
          <div>
            <span>Liqs</span>
            <strong id="liquidations">0</strong>
          </div>
          <div>
            <span>Pulse</span>
            <strong id="pulse">0</strong>
          </div>
        </div>

        <div class="meter-wrap">
          <div class="meter-label">
            <span>Pressure</span>
            <strong id="pressureLabel">Neutral</strong>
          </div>
          <div class="meter">
            <div id="pressureFill" class="meter-fill"></div>
          </div>
        </div>
      </section>

      <aside class="side-panel" aria-label="Flow tape">
        <div class="event-tape-header" aria-hidden="true">
          <span>Side</span>
          <span>Price</span>
          <span>Size</span>
          <span>Fills</span>
          <span>Age</span>
        </div>
        <ol id="eventTape" class="event-tape" aria-label="Recent flow events"></ol>
      </aside>

    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
